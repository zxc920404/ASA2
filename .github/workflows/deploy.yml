name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# 設定 GitHub Pages 部署所需的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只允許一個部署，避免競爭條件
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 取出程式碼
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 設定 Node.js 環境（使用 Node 20 LTS）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安裝依賴（npm ci 比 npm install 更快且更穩定）
      - name: Install dependencies
        run: npm ci

      # 4. 執行 Vite 打包
      - name: Build
        run: npm run build

      # 5. 設定 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 6. 上傳 dist/ 資料夾作為 Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 7. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
